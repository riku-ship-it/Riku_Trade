<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI 翻譯工具</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      padding: 40px;
      width: 100%;
      max-width: 680px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 6px;
      text-align: center;
    }

    .subtitle {
      text-align: center;
      color: #888;
      font-size: 14px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: #444;
      margin-bottom: 8px;
    }

    textarea {
      width: 100%;
      height: 160px;
      padding: 14px 16px;
      font-size: 15px;
      color: #222;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      resize: vertical;
      outline: none;
      transition: border-color 0.2s;
      line-height: 1.6;
      font-family: inherit;
    }

    textarea:focus {
      border-color: #4f8ef7;
    }

    .buttons {
      display: flex;
      gap: 12px;
      margin-top: 16px;
    }

    .btn {
      flex: 1;
      padding: 13px 20px;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s, opacity 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .btn-en {
      background: #4f8ef7;
      color: #fff;
    }

    .btn-en:hover:not(:disabled) {
      background: #3a7be0;
    }

    .btn-ja {
      background: #e74c6f;
      color: #fff;
    }

    .btn-ja:hover:not(:disabled) {
      background: #cf3a5d;
    }

    .result-area {
      margin-top: 28px;
      display: none;
    }

    .result-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .result-label {
      font-size: 14px;
      font-weight: 600;
      color: #444;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .lang-badge {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.5px;
    }

    .lang-badge.en { background: #e8f0fe; color: #4f8ef7; }
    .lang-badge.ja { background: #fde8ed; color: #e74c6f; }

    .copy-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      color: #666;
      cursor: pointer;
      transition: background 0.2s;
    }

    .copy-btn:hover { background: #f5f5f5; }

    .result-box {
      background: #f8f9fb;
      border: 2px solid #e8eaf0;
      border-radius: 10px;
      padding: 16px;
      font-size: 15px;
      line-height: 1.7;
      color: #222;
      min-height: 80px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #888;
      font-size: 14px;
      padding: 16px;
      justify-content: center;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 3px solid #e0e0e0;
      border-top-color: #4f8ef7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-msg {
      color: #e74c3c;
      background: #fdf0ef;
      border: 1px solid #f5c6c0;
      border-radius: 8px;
      padding: 12px 14px;
      font-size: 14px;
      margin-top: 16px;
      display: none;
    }

    .divider {
      border: none;
      border-top: 1px solid #eee;
      margin: 28px 0;
    }

    .footer {
      text-align: center;
      font-size: 12px;
      color: #bbb;
      margin-top: 28px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>✦ AI 翻譯工具</h1>
  <p class="subtitle">由 Gemini 驅動 · 支援中文 → 英文 / 日文</p>

  <label for="inputText">輸入文字</label>
  <textarea id="inputText" placeholder="在這裡輸入想要翻譯的文字…"></textarea>

  <div class="buttons">
    <button class="btn btn-en" id="btnEn" onclick="doTranslate('english')">
      🇺🇸 翻譯成英文
    </button>
    <button class="btn btn-ja" id="btnJa" onclick="doTranslate('japanese')">
      🇯🇵 翻譯成日文
    </button>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <div class="result-area" id="resultArea">
    <hr class="divider" />
    <div class="result-header">
      <div class="result-label">
        翻譯結果
        <span class="lang-badge" id="langBadge"></span>
      </div>
      <button class="copy-btn" onclick="copyResult()">複製</button>
    </div>
    <div class="result-box" id="resultBox"></div>
  </div>

  <div class="footer">Powered by Google Gemini API</div>
</div>

<script>
  // =============================================
  // ⚠️ 請將下方 URL 換成你的 GAS Web App 網址
  // =============================================
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwkPKMYfY-IPIcOjbWeVvXNtT_1eUU4yU25UMyKuGrhzDgc28K4EQGppZt0Suyug3dqSg/exec';
  // =============================================

  async function doTranslate(language) {
    const inputText = document.getElementById('inputText').value.trim();
    const errorMsg = document.getElementById('errorMsg');
    const resultArea = document.getElementById('resultArea');
    const resultBox = document.getElementById('resultBox');
    const langBadge = document.getElementById('langBadge');
    const btnEn = document.getElementById('btnEn');
    const btnJa = document.getElementById('btnJa');

    // 隱藏舊的錯誤與結果
    errorMsg.style.display = 'none';
    resultArea.style.display = 'none';

    if (!inputText) {
      showError('請輸入要翻譯的文字');
      return;
    }

    if (GAS_URL === 'YOUR_GAS_WEB_APP_URL_HERE') {
      showError('請先在 Index.html 中設定 GAS_URL（Google Apps Script Web App 網址）');
      return;
    }

    // 顯示 loading 狀態
    btnEn.disabled = true;
    btnJa.disabled = true;
    resultArea.style.display = 'block';
    resultBox.innerHTML = `<div class="loading"><div class="spinner"></div>翻譯中，請稍候…</div>`;
    langBadge.textContent = language === 'japanese' ? 'JA' : 'EN';
    langBadge.className = 'lang-badge ' + (language === 'japanese' ? 'ja' : 'en');

    try {
      const response = await fetch(GAS_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' }, // GAS 需要 text/plain 避免 CORS preflight
        body: JSON.stringify({ text: inputText, language })
      });

      const data = await response.json();

      if (data.success) {
        resultBox.textContent = data.translation;
      } else {
        resultArea.style.display = 'none';
        showError(data.error || '翻譯失敗，請稍後再試');
      }
    } catch (err) {
      resultArea.style.display = 'none';
      showError('網路錯誤，無法連接到翻譯服務。請確認 GAS_URL 設定是否正確。');
    } finally {
      btnEn.disabled = false;
      btnJa.disabled = false;
    }
  }

  function showError(message) {
    const errorMsg = document.getElementById('errorMsg');
    errorMsg.textContent = '⚠️ ' + message;
    errorMsg.style.display = 'block';
  }

  function copyResult() {
    const text = document.getElementById('resultBox').textContent;
    navigator.clipboard.writeText(text).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = '已複製 ✓';
      setTimeout(() => { btn.textContent = '複製'; }, 2000);
    });
  }

  // 支援 Ctrl+Enter 快速翻譯（預設英文）
  document.getElementById('inputText').addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && (e.ctrlKey || e.metaKey)) {
      translate('english');
    }
  });
</script>

</body>
</html>
